name: stream_heaven_mobile
description: Stream Heaven mobile app shell — auth, profile, and shared foundation.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  design_system:
    path: ../../packages/design-system
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  socket_io_client: ^3.0.2
  intl: ^0.20.2
  uuid: ^4.5.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  firebase_auth_platform_interface: ^7.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
